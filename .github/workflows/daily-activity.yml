name: Daily Site Pulse

on:
  schedule:
    # 每天 UTC 01:15（北京时间约 09:15）
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-site-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update daily pulse data
        run: python3 scripts/update-site-pulse.py

      - name: Commit and push as flutterffi
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          COMMIT_NAME: ${{ vars.ACTIVITY_COMMIT_NAME || 'flutterffi' }}
          COMMIT_EMAIL: ${{ vars.ACTIVITY_COMMIT_EMAIL || 'flutterffi@gmail.com' }}
          # author 与 committer 都设为 flutterffi，避免 PAT 所属账号（如 platojobs）出现在提交者里
          GIT_AUTHOR_NAME: ${{ vars.ACTIVITY_COMMIT_NAME || 'flutterffi' }}
          GIT_AUTHOR_EMAIL: ${{ vars.ACTIVITY_COMMIT_EMAIL || 'flutterffi@gmail.com' }}
          GIT_COMMITTER_NAME: ${{ vars.ACTIVITY_COMMIT_NAME || 'flutterffi' }}
          GIT_COMMITTER_EMAIL: ${{ vars.ACTIVITY_COMMIT_EMAIL || 'flutterffi@gmail.com' }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::缺少 secret: PERSONAL_TOKEN（需对 flutter.ffi 有 push 权限的个人令牌）"
            exit 1
          fi

          git config user.name "$COMMIT_NAME"
          git config user.email "$COMMIT_EMAIL"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add docs/data/site-pulse.json docs/mine.md docs/activity/latest.md
          git commit \
            --author="$COMMIT_NAME <$COMMIT_EMAIL>" \
            -m "chore: daily site pulse $(date -u +%Y-%m-%d)"

          echo "Commit metadata:"
          git log -1 --format=fuller

          # PAT 可以是协作者账号（如 platojobs），仅负责 push；贡献图认 author/committer 邮箱
          git push "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
