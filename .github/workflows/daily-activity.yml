name: Daily Site Pulse

on:
  schedule:
    # 每天 UTC 01:15（北京时间约 09:15）
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-site-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update daily pulse data
        run: python3 scripts/update-site-pulse.py

      - name: Commit and push as flutterffi
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          # 与 GitHub 账户绑定的 noreply 邮箱（用户 flutterffi 的 numeric ID）
          COMMIT_NAME: ${{ vars.ACTIVITY_COMMIT_NAME || 'flutterffi' }}
          COMMIT_EMAIL: ${{ vars.ACTIVITY_COMMIT_EMAIL || '252504539+flutterffi@users.noreply.github.com' }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::缺少 secret: PERSONAL_TOKEN（需对 flutter.ffi 有 push 权限的个人令牌）"
            exit 1
          fi

          git config user.name "$COMMIT_NAME"
          git config user.email "$COMMIT_EMAIL"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add docs/data/site-pulse.json docs/mine.md docs/activity/latest.md
          git commit -m "chore: daily site pulse $(date -u +%Y-%m-%d)"

          # 用个人 PAT 推送，配合上方 author，提交才会计入你的贡献图
          git push "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
