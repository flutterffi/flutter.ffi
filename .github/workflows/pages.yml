name: Deploy Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --verbose 2>&1 | tail -100

      - name: Verify installation
        run: npm list && npm list hexo-cli && npm list hexo

      - name: Install theme
        run: git clone https://github.com/fluid-dev/hexo-theme-fluid.git themes/fluid

      - name: Check npm packages
        run: npm list hexo-cli && npm list hexo

      - name: Check current directory
        run: pwd && ls -la

      - name: List source files
        run: ls -la source/_posts/

      - name: Check hexo commands
        run: node_modules/.bin/hexo help

      - name: Clean and rebuild dependencies
        run: rm -rf node_modules package-lock.json && npm install

      - name: Build Hexo with npx
        run: npx hexo generate --verbose 2>&1 || (echo "BUILD FAILED" && exit 1)
        env:
          TZ: Asia/Shanghai

      - name: Check build output
        run: ls -la public/ || echo "public directory not found"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          publish_dir: ./public
          external_repository: flutterffi/flutterffi.github.io
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: ${{ github.event.head_commit.message }}
