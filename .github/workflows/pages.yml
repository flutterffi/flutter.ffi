name: Deploy Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Fluid theme
        run: |
          git clone --depth 1 https://github.com/fluid-dev/hexo-theme-fluid.git themes/fluid
          cp themes/fluid/_config.yml _config.fluid.yml

      - name: Build site
        run: npm run build
        env:
          TZ: Asia/Shanghai

      - name: Verify public output
        run: |
          if [ ! -d public ] || [ -z "$(ls -A public)" ]; then
            echo "::error::Hexo build did not produce a non-empty public/ directory"
            exit 1
          fi
          ls -la public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          publish_dir: ./public
          external_repository: flutterffi/flutterffi.github.io
          publish_branch: main
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: ${{ github.event.head_commit.message }}
