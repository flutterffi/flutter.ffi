# Site
title: Flutter FFI 技术博客
subtitle: '探索 Flutter 与原生交互的无限可能'
description: '专注 Flutter、FFI、iOS 开发的技术分享'
author: Your Name
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://flutterffi.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  per_page: 10
  order_by: -date
  pagination_dir: page

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
date_time_format: 'YYYY-MM-DD HH:mm:ss'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extension
theme: fluid

# Deploy（本地 hexo deploy 时使用；CI 由 GitHub Actions 推送 public）
deploy:
  type: git
  repo: https://github.com/flutterffi/flutterffi.github.io.git
  branch: main
  token: ${GITHUB_TOKEN}
  name: ${GITHUB_ACTOR}
  email: ${GITHUB_EMAIL}
